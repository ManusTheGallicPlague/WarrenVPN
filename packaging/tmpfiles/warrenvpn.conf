# WarrenVPN persistent directories. Installed to /usr/lib/tmpfiles.d/.
#
# /run/warrenvpn is provided by the daemon unit's RuntimeDirectory= (tmpfs, wiped on
# reboot). Here we declare the persistent state layout. Shadow copies of private
# configurations live under users/<uid>/ and are the ONLY copy OpenVPN is launched
# against; they are written root-owned, group 'warrenvpn', and are not world-readable.

# Forced (admin) preferences + shared configurations. Declared here so its
# existence and group ownership are deterministic, independent of the daemon's
# ConfigurationDirectory= side effect.
d /etc/warrenvpn                0755 root warrenvpn -

d /var/lib/warrenvpn            0750 root warrenvpn -
d /var/lib/warrenvpn/users      0750 root warrenvpn -
d /var/lib/warrenvpn/shared     0750 root warrenvpn -
d /var/lib/warrenvpn/recovery   0700 root warrenvpn -
