<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus-1/busconfig.dtd">

<!--
  System-bus policy for the WarrenVPN daemon. Installed to /usr/share/dbus-1/system.d/.

  Only root may own the service name. Any client may send messages to it (so the
  daemon can be D-Bus-activated and reached from a normal user session); actual
  authorization for each privileged method is enforced by the daemon via polkit,
  NOT by this file. We still scope what unprivileged callers may invoke to the two
  manager/connection interfaces.
-->
<busconfig>

  <policy user="root">
    <allow own="net.warrenvpn.WarrenVPN1"/>
  </policy>

  <policy context="default">
    <allow send_destination="net.warrenvpn.WarrenVPN1"
           send_interface="net.warrenvpn.WarrenVPN1.Manager"/>
    <allow send_destination="net.warrenvpn.WarrenVPN1"
           send_interface="net.warrenvpn.WarrenVPN1.Connection"/>
    <allow send_destination="net.warrenvpn.WarrenVPN1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="net.warrenvpn.WarrenVPN1"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="net.warrenvpn.WarrenVPN1"
           send_interface="org.freedesktop.DBus.Peer"/>
  </policy>

</busconfig>
